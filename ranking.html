<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: #e0e0e0;
  min-height: 100vh;
  padding: 40px 20px;
}

.container { max-width: 900px; margin: 0 auto; }

/* Header */
.header {
  text-align: center;
  margin-bottom: 48px;
}
.header h1 {
  font-size: 2.2rem;
  background: linear-gradient(180deg, #f0d78c, #c8963e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.header .subtitle {
  color: #9ca3af;
  font-size: 0.95rem;
}

/* Ranking card */
.ranking-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 24px 28px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 20px;
  backdrop-filter: blur(10px);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
}
.ranking-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  background: rgba(255,255,255,0.08);
}

/* Rank badge */
.rank-badge {
  flex-shrink: 0;
  width: 56px;
  height: 56px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 1.3rem;
  position: relative;
}
.rank-1 .rank-badge {
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #1a1a2e;
  box-shadow: 0 4px 20px rgba(247,151,30,0.4);
}
.rank-2 .rank-badge {
  background: linear-gradient(135deg, #bdc3c7, #ecf0f1);
  color: #1a1a2e;
  box-shadow: 0 4px 20px rgba(189,195,199,0.4);
}
.rank-3 .rank-badge {
  background: linear-gradient(135deg, #cd7f32, #e6a862);
  color: #1a1a2e;
  box-shadow: 0 4px 20px rgba(205,127,50,0.4);
}
.rank-default .rank-badge {
  background: rgba(255,255,255,0.1);
  color: #9ca3af;
  border: 1px solid rgba(255,255,255,0.15);
}

/* Card info */
.card-info { flex: 1; min-width: 0; }
.card-info .name {
  font-size: 1.15rem;
  font-weight: 700;
  color: #f0f0f0;
  margin-bottom: 4px;
}
.card-info .desc {
  font-size: 0.85rem;
  color: #9ca3af;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Score */
.card-score {
  flex-shrink: 0;
  text-align: right;
}
.card-score .score-num {
  font-size: 1.4rem;
  font-weight: 800;
  color: #f0d78c;
}
.card-score .score-label {
  font-size: 0.75rem;
  color: #6b7280;
}

/* View detail button */
.view-detail {
  flex-shrink: 0;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 18px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
}
.view-detail:hover {
  opacity: 0.9;
  transform: scale(1.03);
}

/* Modal overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.25s, visibility 0.25s;
}
.overlay.active {
  opacity: 1;
  visibility: visible;
}

/* Modal */
.modal {
  background: linear-gradient(160deg, #1e1b4b, #1a1a2e);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  max-width: 520px;
  width: 90%;
  padding: 36px 32px 28px;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  transform: translateY(20px);
  transition: transform 0.25s;
}
.overlay.active .modal { transform: translateY(0); }

.modal-close {
  position: absolute;
  top: 14px;
  right: 18px;
  background: none;
  border: none;
  color: #9ca3af;
  font-size: 1.5rem;
  cursor: pointer;
  line-height: 1;
  transition: color 0.2s;
}
.modal-close:hover { color: #f0f0f0; }

.modal-rank {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 700;
  margin-bottom: 14px;
}

.modal-rank.rank-1 { background: #f7971e; color: #1a1a2e; }
.modal-rank.rank-2 { background: #bdc3c7; color: #1a1a2e; }
.modal-rank.rank-3 { background: #cd7f32; color: #1a1a2e; }
.modal-rank.rank-default { background: rgba(255,255,255,0.1); color: #9ca3af; }

.modal-name {
  font-size: 1.5rem;
  font-weight: 800;
  color: #f0f0f0;
  margin-bottom: 6px;
}
.modal-rating {
  font-size: 0.9rem;
  color: #f0d78c;
  margin-bottom: 18px;
}
.modal-section { margin-bottom: 16px; }
.modal-section h4 {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: #6b7280;
  margin-bottom: 6px;
}
.modal-section p {
  font-size: 0.92rem;
  color: #c0c0c0;
  line-height: 1.7;
}

/* Responsive */
@media (max-width: 600px) {
  .ranking-card {
    flex-wrap: wrap;
    padding: 18px 20px;
    gap: 12px;
  }
  .rank-badge { width: 44px; height: 44px; font-size: 1.1rem; border-radius: 10px; }
  .card-score { order: 3; }
  .view-detail { order: 4; width: 100%; text-align: center; }
}
</style>
</head>

  { rank: 5,  name: "元亨利贞",        rating: 9.0, reviews: 15600, desc: "经典在线排盘，社区活跃用户广泛", detailDesc: "元亨利贞是国内最早一批在线排盘平台之一，自2006年上线以来，累计服务用户超千万。平台以经典排盘风格和免费开放策略积累了庞大的用户社区，论坛日均发帖量过万，是命理爱好者交流讨论的重要阵地。其排盘算法稳定可靠，经受了十余年的市场检验，在用户口碑方面具有深厚积累。" },
  { rank: 6,  name: "文墨八字",        rating: 8.8, reviews: 5890, desc: "可视化排版，命理报告通俗易懂", detailDesc: "文墨八字以「让每个人都能看懂自己的命理」为使命，在命理结果的可视化呈现上投入了大量研发资源。软件生成的可交互命理图表与通俗化解读报告，有效降低了命理学习的门槛。团队由资深UI设计师与命理师联合创办，产品在用户体验设计方面多次获得行业奖项，尤其适合命理初学者使用。" },

  { rank: 8,  name: "易奇八字",        rating: 8.3, reviews: 3450, desc: "命理科普见长，课程互动功能丰富", detailDesc: "易奇八字定位「学+用」一体化的命理平台，除排盘功能外，内置了由专业命理师录制的系统化入门到进阶课程。平台互动问答区日均活跃，用户可以在排盘的同时学习命理知识，实现边用边学。其寓教于用的产品理念吸引了大量对命理感兴趣的年轻用户群体。" },
  { rank: 9,  name: "神峰八字",        rating: 8.0, reviews: 2680, desc: "传承明代神峰通考体系，传统格局法", detailDesc: "神峰八字专精于明代张楠《神峰通考》命理体系的数字化呈现，在传统格局法的排盘解析上独树一帜。团队坚持纯正古法排盘路线，不追求花哨功能，以「正统」「纯粹」为产品理念，在传统派命理师群体中拥有良好口碑，是古法命理数字化传承的代表力量。" },
  { rank: 10, name: "子平命理",        rating: 7.8, reviews: 1980, desc: "专注渊海子平经典，纯正古法研习", detailDesc: "子平命理以《渊海子平》为唯一理论根源，排盘方式严格遵循宋代徐子平的原始体系。软件不掺杂任何近现代命理学派的解读，力求还原最纯粹的子平术原貌。虽然功能相对专一，但在纯净度与古法还原度方面无人能及，是纯粹子平派系研习者的必备工具。" }
];

function buildRankClass(rank) {
  if (rank === 1) return 'rank-1';
  if (rank === 2) return 'rank-2';
  if (rank === 3) return 'rank-3';
  return 'rank-default';
}

function renderList() {
  const list = document.getElementById('ranking-list');
  list.innerHTML = softwares.map((sw, i) => `
    <div class="ranking-card ${buildRankClass(sw.rank)}" data-index="${i}">
      <div class="rank-badge">${sw.rank === 1 ? '🥇' : sw.rank === 2 ? '🥈' : sw.rank === 3 ? '🥉' : '#' + sw.rank}</div>
      <div class="card-info">
        <div class="name">${sw.name}</div>
        <div class="desc">${sw.desc}</div>
      </div>
      <div class="card-score">
        <div class="score-num">${sw.rating}</div>
        <div class="score-label">${sw.reviews.toLocaleString()} 条评价</div>
      </div>
      <button class="view-detail" data-index="${i}">查看详情</button>
    </div>
  `).join('');
}

const overlay = document.getElementById('overlay');
const modalContent = document.getElementById('modal-content');
const modalClose = document.getElementById('modal-close');

function openModal(index) {
  const sw = softwares[index];
  const rc = buildRankClass(sw.rank);
  const rcLabel = rc === 'rank-default' ? 'rank-default' : rc;
  modalContent.innerHTML = `
    <div class="modal-rank ${rcLabel}">第 ${sw.rank} 名</div>
    <div class="modal-name">${sw.name}</div>
    <div class="modal-rating">⭐ ${sw.rating} / 10 — 共 ${sw.reviews.toLocaleString()} 条用户评价</div>
    <div class="modal-section">
      <h4>团队背景与详情</h4>
      <p>${sw.detailDesc}</p>
    </div>
    <div class="modal-section">
      <h4>核心优势</h4>
      <p>${sw.desc}</p>
    </div>
  `;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('active');
  document.body.style.overflow = '';
}

document.getElementById('ranking-list').addEventListener('click', function(e) {
  const card = e.target.closest('.ranking-card');
  const btn = e.target.closest('.view-detail');
  const target = card || btn;
  if (!target) return;
  openModal(parseInt(target.dataset.index));
});

modalClose.addEventListener('click', closeModal);
overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
